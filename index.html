<!DOCTYPE html>

<head>

<title>VLA 진화 로드맵</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');
:root { --bd:#e2e8f0; --t1:#111827; --t2:#6b7280; --t3:#9ca3af; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#fff; color:var(--t1); font-family:'Noto Sans KR',sans-serif; padding:36px 48px 80px; }
.hdr { text-align:center; margin-bottom:48px; }
.hdr .eye { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--t3); margin-bottom:6px; }
.hdr h1 { font-size:23px; font-weight:800; letter-spacing:-.5px; }
.hdr p { font-size:12px; color:var(--t2); margin-top:4px; }
.canvas { position:relative; margin:0 auto; }
.canvas svg.track { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }
.era { position:absolute; transform:translate(-50%,-50%); z-index:10; display:flex; flex-direction:column; align-items:center; padding:5px 13px; border-radius:999px; border:1.5px solid var(--ec); background:#fff; color:var(--ec); box-shadow:0 0 0 5px #fff; white-space:nowrap; }
.era .yr { font-size:13px; font-weight:800; line-height:1.1; }
.era .sb { font-size:8.5px; font-weight:600; margin-top:1px; }
.card { position:absolute; background:#fff; border:1px solid var(--bd); border-radius:10px; padding:10px 12px 9px; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.05); transition:transform .18s,border-color .18s,box-shadow .18s; }
.card:hover { border-color:var(--ec); box-shadow:0 6px 20px color-mix(in srgb,var(--ec) 14%,transparent); transform:translateY(-3px); }
.card.below:hover { transform:translateY(3px); }
.ctop { display:flex; align-items:flex-start; justify-content:space-between; gap:5px; margin-bottom:5px; }
.ctitle { font-size:12px; font-weight:800; color:var(--ec); line-height:1.2; }
.cdate { font-size:8.5px; font-weight:700; color:var(--t2); background:#f5f5f6; border:1px solid #ebebed; border-radius:999px; padding:1.5px 6px; white-space:nowrap; flex-shrink:0; }
.cdesc { font-size:10px; color:var(--t2); line-height:1.45; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.ctags { display:flex; flex-wrap:wrap; gap:3px; margin-top:7px; }
.tag { font-size:8px; font-weight:700; padding:1.5px 5px; border-radius:999px; white-space:nowrap; }
.hint { display:block; font-size:8px; font-weight:700; margin-top:6px; opacity:0; transition:opacity .18s; text-align:right; }
.card:hover .hint { opacity:1; }
.ov { position:fixed; inset:0; background:rgba(255,255,255,.9); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; visibility:hidden; transition:all .22s; padding:20px; }
.ov.on { opacity:1; visibility:visible; }
.mb { background:#fff; border:1px solid var(--bd); border-radius:16px; padding:24px; width:100%; max-width:460px; position:relative; transform:translateY(14px) scale(.97); transition:all .22s; box-shadow:0 16px 40px rgba(0,0,0,.09); }
.ov.on .mb { transform:none; }
.xbtn { position:absolute; top:13px; right:13px; background:none; border:none; font-size:22px; color:var(--t2); cursor:pointer; line-height:1; }
.xbtn:hover { color:var(--t1); }
.mt { font-size:20px; font-weight:800; margin-bottom:8px; padding-right:28px; }
.mm { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.md { font-size:11px; color:var(--t2); background:#f5f5f6; padding:3px 10px; border-radius:999px; }
.ma { font-size:10px; font-weight:700; color:#b91c1c; background:#fef2f2; border:1px solid #fecaca; padding:3px 9px; border-radius:999px; }
.mbody { font-size:13px; line-height:1.7; color:var(--t1); margin-bottom:16px; }
.mbody strong { color:var(--mc,#111827); }
.mf { display:flex; flex-wrap:wrap; gap:6px; border-top:1px solid var(--bd); padding-top:14px; }
</style>
</head>

const NODES = [

    title:'RT-1', date:'2022.12',
    short:'비전·언어 입력으로 로봇 행동을 출력한 VLA의 출발점.',
    arxiv:'arXiv:2212.06817', tags:['Google Research','Transformer'],
    detail:'<strong>범용 로봇 정책의 시작:</strong> 구글 리서치가 2022년 12월 공개한 최초의 대규모 멀티태스크 로봇 제어 모델입니다.<br><br>13대 로봇이 17개월간 수집한 13만 개 에피소드, 700개 이상의 태스크로 학습했습니다. EfficientNet으로 이미지를 처리하고 TokenLearner로 압축한 뒤 Transformer가 행동 토큰을 출력하는 구조로, 35M 파라미터에도 불구하고 3Hz 실시간 제어가 가능합니다.<br><br>훈련 태스크 97% 성공률을 기록했고, 새로운 태스크·배경·물체에 대한 제로샷 일반화를 처음으로 증명했습니다. "대규모 데이터 + 트랜스포머 = 범용 로봇 정책"이라는 패러다임을 열었습니다.' },

  { era:1, label:'2023', sub:'행동 품질', color:'#d97706', row:0, x:300 },
  { x:440,  row:0, side:'up',   color:'#d97706',
    title:'ACT', date:'2023.04',
    short:'chunk 예측으로 정밀 조작 오류 누적을 크게 줄인 기반 구조.',
    arxiv:'arXiv:2304.13705', tags:['Chunk Prediction','CVAE'],
    detail:'<strong>Action Chunking with Transformers:</strong> Stanford의 Tony Zhao 등이 2023년 4월 공개한 imitation learning 알고리즘으로, 저가형 하드웨어에서 정밀 양팔 조작을 가능하게 했습니다.<br><br>핵심 아이디어는 단일 스텝 대신 k개의 미래 행동을 묶음(chunk)으로 한 번에 예측해 유효 horizon을 줄이는 것입니다. CVAE를 통해 사람 시연의 비결정성을 잠재 변수 z로 흡수하고, temporal ensembling으로 청크 간 전환을 부드럽게 합니다.<br><br>단 10분 시연 데이터만으로 배터리 삽입·케이블 타이 체결 등 6개의 초정밀 태스크에서 80~90% 성공률을 달성했습니다. 이후 π0, GR00T N1, OpenVLA-OFT 등 대부분의 고성능 VLA가 chunk 예측 방식을 채택합니다.' },

  { x:550,  row:0, side:'down', color:'#d97706',
    title:'Diffusion Policy', date:'2023.05',
    short:'Diffusion을 로봇 제어에 도입, 부드럽고 다양한 행동 생성.',
    arxiv:'arXiv:2303.04137', tags:['Diffusion','Generative Policy'],
    detail:'<strong>생성형 정책의 전환점:</strong> Columbia·MIT·Toyota Research 팀이 2023년 발표한 연구로, 이미지 생성 AI에서 쓰이던 DDPM(Denoising Diffusion Probabilistic Model)을 로봇 행동 생성에 최초로 체계적으로 적용했습니다.<br><br>기존 behavior cloning은 멀티모달한 행동 분포(같은 상황에서 여러 합리적 행동이 존재)를 평균화해 버리는 문제가 있었습니다. Diffusion Policy는 노이즈에서 시작해 반복적으로 디노이징하며 행동 시퀀스를 생성하므로 이 멀티모달리티를 자연스럽게 포착합니다.<br><br>관절 제어와 end-effector 제어 모두에서 기존 BC·IBC 대비 일관되게 높은 성능을 보였습니다. 이후 π0의 Flow Matching, GR00T N1의 action expert 등 현재 고성능 VLA의 action head 설계 방향을 결정지은 연구입니다.'},

    detail:'<strong>VLM 백본 전략의 정립:</strong> Google DeepMind가 2023년 7월 발표한 연구로, 인터넷 규모로 사전학습된 VLM(PaLI-X 5B/55B, PaLM-E 12B)을 VLA 백본으로 활용하는 전략을 처음으로 대규모 실증했습니다.<br><br>로봇 행동을 텍스트 토큰과 동일한 형식으로 표현해 VLM 파인튜닝 파이프라인에 그대로 투입했습니다. 6,000회 이상의 실제 로봇 평가에서 unseen 시나리오 성공률을 RT-1의 32%에서 62%로 높였습니다.<br><br>특히 명시적으로 학습하지 않은 추론 능력의 창발이 인상적입니다. "가장 큰 물체를 집어라", "1+1번째 칸에 놓아라" 같은 언어 추론이 필요한 명령도 수행하며, chain-of-thought 프롬프팅으로 다단계 계획도 가능함을 보였습니다.'},

  // ── ROW 1  ←  2024 H1 · H2 ─────────────────────
  { era:1, label:'2024 H1', sub:'오픈소스',  color:'#ea580c', row:0, x:950 },
  { x:800,  row:1, side:'up',   color:'#ea580c',
    title:'Octo', date:'2024.05',
    short:'최초 오픈소스 범용 VLA, 커뮤니티 기준 모델로 자리잡음.',
    arxiv:'arXiv:2405.12213', tags:['UC Berkeley','Open Source','93M'],
    detail:'<strong>연구의 민주화:</strong> UC Berkeley·Stanford·CMU 등이 공동으로 2024년 5월 공개한 최초의 오픈소스 범용 VLA입니다.<br><br>93M 파라미터의 비교적 작은 모델로, Open X-Embodiment 데이터셋(9개 기관, 25개 로봇 플랫폼, 80만 개 이상의 궤적)으로 학습됐습니다. 트랜스포머 백본에 Diffusion action head를 결합한 구조이며, 다양한 관찰 공간·행동 공간에 플러그인 방식으로 적응할 수 있습니다.<br><br>모델 가중치, 파인튜닝 코드, 학습 파이프라인을 모두 공개해 연구 커뮤니티의 공식 기준 모델(baseline)이 됐습니다. 이후 π0, OpenVLA 등 대부분의 논문이 Octo와 비교 평가를 수행합니다.'},

  { x:730,  row:1, side:'down', color:'#ea580c',
    title:'OpenVLA', date:'2024.06',
    short:'RT-2-X를 능가한 7B 오픈소스 VLA, LoRA 경량 파인튜닝 지원.',
    arxiv:'arXiv:2406.09246', tags:['Stanford','7B params','LoRA'],
    detail:'<strong>오픈 VLM 기반 VLA:</strong> Stanford·UC Berkeley·Google이 2024년 6월 공개한 7B 파라미터 오픈소스 VLA입니다.<br><br>Llama 2를 언어 백본으로, DINOv2와 SigLIP을 시각 인코더로 활용하며, 970k 실세계 로봇 시연(Open X-Embodiment)으로 학습됐습니다. 행동을 256개 구간으로 이산화해 텍스트 토큰으로 표현하는 방식을 사용합니다.<br><br>29개 태스크에서 55B 파라미터의 RT-2-X를 16.5%p 차이로 앞질렀습니다. LoRA·QLoRA 경량 파인튜닝을 공식 지원해 소비자 GPU(RTX 4090 1장)에서도 커스터마이징이 가능하며, 양자화 시 성능 손실 없이 추론 효율도 확보됩니다.'},

  { era:1, label:'2024 H2', sub:'실전 제어', color:'#b91c1c', row:1, x:420 },
  { x:280,  row:1, side:'up',   color:'#b91c1c',
    title:'π0 (pi-zero)', date:'2024.10',
    short:'50Hz 고빈도 연속 제어 달성, 연구→실배포 수준으로의 분기점.',
    arxiv:'arXiv:2410.24164', tags:['Physical Intelligence','Flow Matching','50Hz'],
    detail:'<strong>실제 배포 수준 전환:</strong> Physical Intelligence가 2024년 10월 공개한 첫 플래그십 모델로, VLA 연구가 "논문 수준"에서 "실제 배포 수준"으로 넘어가는 분기점으로 평가받습니다.<br><br>PaliGemma 3B VLM을 백본으로 하고, 연속 행동을 생성하는 flow matching 기반 action expert를 결합한 이중 구조입니다. 50Hz 고빈도 제어가 가능해 세탁물 접기·식기 정리·토스트 꺼내기 등 높은 dexterity가 요구되는 태스크를 처리합니다.<br><br>단일 팔·양팔·모바일 매니퓰레이터 등 다양한 로봇 플랫폼에서 하나의 모델로 동작하며, 73ms 추론 시간(RTX GPU 기준)으로 실시간 제어가 가능합니다. 이후 π0.5, π*0.6, MEM 등 Physical Intelligence 후속 연구 전체의 기반이 됩니다.'},

  // ── ROW 2  →  2025 H1 ──────────────────────────
  { era:1, label:'2025 H1', sub:'효율·일반화', color:'#2563eb', row:1, x:60  },
  { x:150,  row:2, side:'up',   color:'#2563eb',
    title:'FAST / π0-FAST', date:'2025.01',
    short:'DCT 기반 주파수 토크나이징으로 VLA 학습 속도 약 5배 향상.',
    arxiv:'arXiv:2501.09747', tags:['Physical Intelligence','DCT','5× Training'],
    detail:'<strong>FAST 토크나이저:</strong> Physical Intelligence가 2025년 1월 공개한 연구로, 연속 행동 시퀀스를 주파수 영역에서 효율적으로 토크나이징하는 방법론입니다.<br><br>핵심은 Discrete Cosine Transform(DCT)입니다. 원시 행동 시퀀스를 DCT로 주파수 도메인으로 변환한 뒤, 고주파 계수를 제거하고 나머지를 양자화·인코딩해 소수의 이산 토큰으로 압축합니다. 이 토큰을 autoregressive하게 예측하므로 별도의 diffusion action head 없이도 고품질 행동을 생성합니다.<br><br>기존 diffusion 기반 VLA 대비 학습(training) 속도를 약 5배 개선했고, NORA·π0.5 등 후속 모델들이 이 토크나이저를 채택합니다. 경량 모델에서도 복잡한 조작 태스크를 처리할 수 있는 길을 열었습니다.'},

  { x:380,  row:2, side:'down', color:'#2563eb',
    title:'GR00T N1', date:'2025.03',
    short:'계획·실행 분리 계층 구조, 휴머노이드 전신 제어 오픈 모델.',
    arxiv:'arXiv:2503.14734', tags:['NVIDIA','Humanoid','Dual-system'],
    detail:'<strong>듀얼 시스템 구조:</strong> NVIDIA Research가 2025년 3월 공개한 오픈소스 휴머노이드 파운데이션 모델입니다.<br><br>카너먼의 "생각에 관한 생각"에서 영감을 받아 System 2(느린 추론·계획, VLM 기반)와 System 1(빠른 반사·실행, DiT 기반 action expert)을 분리한 계층 구조를 채택했습니다. Eagle VLM을 비전-언어 백본으로 사용하며 언어 명령을 이해해 고수준 계획을 생성하고, action expert가 이를 실제 모터 명령으로 변환합니다.<br><br>텔레오퍼레이션 데이터, 시뮬레이션, 월드모델 합성 데이터를 혼합 학습한 최초의 대형 오픈 휴머노이드 파운데이션 모델로, 모델 가중치와 학습 코드를 모두 공개했습니다.'},

  { x:500,  row:2, side:'up',   color:'#2563eb',
    title:'π0.5', date:'2025.04',

// =====================================================
//  렌더링 엔진 — 아래는 수정 불필요
// =====================================================
function build(){
  const { CANVAS_W:W, CARD_W:CW, CARD_H:CH, STEM, ROW_H, TURN_R:R,
          SPINE_Y0:SY0, SPINE_CLR:sc } = CFG;

  // row별 spine y
  const rowNums = [...new Set(NODES.map(n=>n.row))].sort((a,b)=>a-b);
  const SY = {};
  rowNums.forEach(ri => { SY[ri] = SY0 + ri * ROW_H; });

  // 포지셔닝
  const positioned = NODES.map(n => {
    const p = { ...n, sy: SY[n.row] };
    if (!n.era) {
      const up = n.side === 'up';
      p.cardX = n.x - CW / 2;
      p.cardY = up ? SY[n.row] - STEM - CH : SY[n.row] + STEM;
      p.above = up;
    }
    return p;
  });

  const canvasH = SY[rowNums[rowNums.length-1]] + SY0 + CH + STEM + 20;
  const canvas = document.getElementById('canvas');
  canvas.style.width  = W + 'px';
  canvas.style.height = canvasH + 'px';

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.classList.add('track');
  svg.setAttribute('width',  W);
  svg.setAttribute('height', canvasH);
  svg.setAttribute('viewBox', `0 0 ${W} ${canvasH}`);

  const mk = (tag, attrs) => {
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
    return el;
  };

  // Spines
  rowNums.forEach(ri => {
    const xs = positioned.filter(p=>p.row===ri).map(p=>p.x);
    svg.appendChild(mk('line',{
      x1:Math.min(...xs), x2:Math.max(...xs),
      y1:SY[ri], y2:SY[ri],
      stroke:sc, 'stroke-width':2
    }));
  });

  // Turns + 연결선
  // row i→i+1: 짝수 row 끝(오른쪽), 홀수 row 끝(왼쪽)
  for(let i=0; i<rowNums.length-1; i++){
    const ri  = rowNums[i];
    const ri1 = rowNums[i+1];
    const ltr = (ri % 2 === 0); // 현재 row 방향
    const xs0 = positioned.filter(p=>p.row===ri ).map(p=>p.x);
    const xs1 = positioned.filter(p=>p.row===ri1).map(p=>p.x);
    // turn x = 현재 row의 끝점
    const turnX  = ltr ? Math.max(...xs0) : Math.min(...xs0);
    // 다음 row 시작점
    const startX = ltr ? Math.max(...xs1) : Math.min(...xs1);
    const y1 = SY[ri], y2 = SY[ri1];
    const ry = (y2 - y1) / 2;
    const sweep = ltr ? 1 : 0;

    // arc
    svg.appendChild(mk('path',{
      d:`M ${turnX} ${y1} A ${R} ${ry} 0 0 ${sweep} ${turnX} ${y2}`,
      fill:'none', stroke:sc, 'stroke-width':2
    }));
    // 연결선: turn 바닥 → 다음 spine 첫 점
    svg.appendChild(mk('line',{
      x1:turnX, x2:startX, y1:y2, y2:y2,
      stroke:sc, 'stroke-width':2
    }));
  }

  // Stems + dots
  positioned.forEach(p => {
    if(p.era) return;
    const y1 = p.above ? p.sy-STEM : p.sy;
    const y2 = p.above ? p.sy     : p.sy+STEM;
    svg.appendChild(mk('line',{x1:p.x,x2:p.x,y1,y2,stroke:p.color+'66','stroke-width':1.5}));
    svg.appendChild(mk('circle',{cx:p.x,cy:p.sy,r:5.5,fill:p.color,stroke:'#fff','stroke-width':2.5}));
  });

  canvas.appendChild(svg);

  // Era badges
  positioned.filter(p=>p.era).forEach(p=>{
    const el = document.createElement('div');
    el.className = 'era';
    el.style.cssText = `left:${p.x}px;top:${p.sy}px;--ec:${p.color}`;
    el.innerHTML = `<span class="yr">${p.label}</span><span class="sb">${p.sub}</span>`;
    canvas.appendChild(el);
  });

  // Cards
  positioned.filter(p=>p.title).forEach(p=>{
    const el = document.createElement('div');
    el.className = 'card' + (p.above ? '' : ' below');
    el.style.cssText = `left:${p.cardX}px;top:${p.cardY}px;width:${CFG.CARD_W}px;--ec:${p.color}`;
    const tags = p.tags.map(t =>
      `<span class="tag" style="background:color-mix(in srgb,${p.color} 9%,transparent);color:${p.color};border:1px solid color-mix(in srgb,${p.color} 18%,transparent)">${t}</span>`
    ).join('');
    el.innerHTML = `
      <div class="ctop"><span class="ctitle">${p.title}</span><span class="cdate">${p.date}</span></div>
      <p class="cdesc">${p.short}</p>
      <div class="ctags">${tags}</div>
      <span class="hint" style="color:${p.color}">➕ 상세 정보</span>`;
    el.dataset.title  = p.title;
    el.dataset.date   = p.date;
    el.dataset.color  = p.color;
    el.dataset.arxiv  = p.arxiv || '';
    el.dataset.detail = p.detail;
    el.dataset.tags   = p.tags.join(',');
    el.addEventListener('click', openModal);
    canvas.appendChild(el);
  });
}

function openModal(e){
  const el=e.currentTarget, c=el.dataset.color;
  document.getElementById('mt').textContent = el.dataset.title;
  document.getElementById('mt').style.color = c;
  document.getElementById('md').textContent = el.dataset.date;
  const ma = document.getElementById('ma');
  if(el.dataset.arxiv){ ma.textContent=el.dataset.arxiv; ma.style.display='inline-block'; }
  else ma.style.display='none';
  document.getElementById('mbody').innerHTML = el.dataset.detail;
  document.getElementById('mbody').style.setProperty('--mc', c);
  const mf = document.getElementById('mf');
  mf.innerHTML = '';
  el.dataset.tags.split(',').forEach(t=>{
    const s = document.createElement('span');
    s.className = 'tag'; s.textContent = t;
    s.style.cssText = `background:color-mix(in srgb,${c} 9%,transparent);color:${c};border:1px solid color-mix(in srgb,${c} 18%,transparent)`;
    mf.appendChild(s);
  });
  document.getElementById('ov').classList.add('on');
}
const close = () => document.getElementById('ov').classList.remove('on');
document.getElementById('xbtn').addEventListener('click', close);
document.getElementById('ov').addEventListener('click', e=>{ if(e.target===document.getElementById('ov')) close(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') close(); });
build();
</script>
